apiVersion: apps/v1
kind: Deployment
metadata:
  name: multi-mcp
  namespace: multi-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: multi-mcp
  template:
    metadata:
      labels:
        app: multi-mcp
    spec:
      securityContext:
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: multi-mcp
        image: multi-mcp:1.0.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8083
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: multi-mcp-service
  namespace: multi-mcp
spec:
  type: NodePort
  selector:
    app: multi-mcp
  ports:
  - port: 8083
    targetPort: 8083
    nodePort: 30080
